# Production stack for House of Parfum.
#
# Prereqs on the VPS (one-time):
#   1. Shared infra running:           cd ~/infra && docker compose up -d
#   2. Storage host dir exists:        mkdir -p ~/data/house-of-parfum/storage
#   3. Env file filled in:             backend/.env.production
#
# First deploy:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Subsequent deploys:
#   git pull
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec backend php artisan migrate --force
#
# Logs live at: ~/data/house-of-parfum/storage/logs/laravel.log

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hop-backend:latest
    container_name: hop-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env.production
    environment:
      DB_HOST: mysql
    volumes:
      - ~/data/house-of-parfum/storage:/var/www/storage
    networks:
      - axelnova-shared
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: hop-frontend:latest
    container_name: hop-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_API_BASE: http://backend:8000/api
      NUXT_PUBLIC_API_BASE: https://hop-api.axelnova.tech/api
    depends_on:
      - backend
    networks:
      - axelnova-shared
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  axelnova-shared:
    name: axelnova-shared
    external: true
