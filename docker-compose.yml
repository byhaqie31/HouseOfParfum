services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: hop-frontend-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - API_BASE_URL=http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - axelnova-shared

  backend:
    build: ./backend
    container_name: hop-backend-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - backend-storage:/var/www/storage
    networks:
      - axelnova-shared

volumes:
  backend-storage:

networks:
  axelnova-shared:
    external: true
